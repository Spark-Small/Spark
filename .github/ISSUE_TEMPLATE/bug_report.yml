name: Bug
description: Something is broken
title: "[fix]: "
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Module scope
      placeholder: auth | feed | profile | …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / build
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
